services:
  - type: web
    name: temp-email-app
    env: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: cd server && npm install && cd .. && npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://temp-email-app.onrender.com,https://mailo.dpdns.org
      - key: RATE_LIMIT_MAX
        value: "30"
      - key: FETCH_TIMEOUT_MS
        value: "15000"
      - key: PORT
        value: "10000"
